<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" type="text/css" href="styles/style.css" />
    <script type="text/javascript" src="scripts/wordle.js"></script>
</head>

<body>
    <div id="game-container">
        <h1>Wordle Clone</h1>
        <div id="stats">
            Games: <span id="games-played">0</span> | 
            Win %: <span id="win-percent">0</span> | 
            Streak: <span id="current-streak">0</span>
        </div>
        <div id="message"></div>
        <div id="board"></div>
        <div class="controls">
            <input type="text" id="guessInput" maxlength="5" placeholder="Enter 5 letters" />
            <button type="button" id="guessButton">Guess</button>
            <button type="button" id="newGameButton" style="display: none;">New Game</button>
        </div>
    </div>
</body>

</html>

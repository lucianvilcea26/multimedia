<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Document</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #eee;
        }
        #keyboard {
            background-color: #333;
            border: 1px solid black;
            padding: 200px 20px 30px 20px;
            border-radius: 15px;
        }
        #keypad {
            display: flex;
            width: 100%;
            border-radius: 5px;
        }
        .whiteKey {
            height: 240px;
            width: 40px;
            background-color: white;
            border: 1px solid black;
            border-radius: 0 0 5px 5px;
            box-shadow: inset 0 -5px 10px rgba(0,0,0,0.1);
            transition: all 0.1s;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 5px;
            font-size: 10px;
            box-sizing: border-box;
            cursor: pointer;
        }
        .whiteKey:hover {
            background-color: #f0f0f0;
            box-shadow: inset 0 -2px 5px rgba(0,0,0,0.2);
        }
        .blackKey {
            height: 140px;
            width: 24px;
            background-color: black;
            border: 1px solid black;
            margin: 0 -13px;
            z-index: 2;
            border-radius: 0 0 3px 3px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            transition: all 0.1s;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 5px;
            font-size: 10px;
            color: white;
            box-sizing: border-box;
            cursor: pointer;
        }
        .blackKey:hover {
            background-color: #333;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
    </style>
</head>

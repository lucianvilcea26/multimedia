<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts/script.js"></script>
</head>

<body>
    <div class="container py-4">
        <h1 class="text-center mb-4">Music Library</h1>
        
        <div class="row mb-4 g-3">
            <div class="col-md-6">
                <input type="text" id="searchInput" class="form-control" placeholder="Search by artist or album...">
            </div>
            <div class="col-md-6 d-flex gap-2">
                <button id="sortArtist" class="btn btn-outline-secondary flex-grow-1">Sort Artist (A-Z)</button>
                <button id="sortAlbum" class="btn btn-outline-secondary flex-grow-1">Sort Album (A-Z)</button>
                <button id="sortTracks" class="btn btn-outline-secondary flex-grow-1">Sort by Tracks</button>
            </div>
        </div>

        <div id="albumGrid" class="row">
        </div>
    </div>

    <button id="backToTop" class="btn btn-primary rounded-circle shadow">↑</button>

    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Modal title</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    ...
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary">Save changes</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
